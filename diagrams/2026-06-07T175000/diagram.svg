<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" font-family="Noto Sans SC, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="hermes" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>
    <linearGradient id="openclaw" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f093fb"/>
      <stop offset="100%" stop-color="#f5576c"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="900" fill="url(#bg)"/>

  <!-- 标题 -->
  <text x="600" y="50" text-anchor="middle" fill="#ffffff" font-size="28" font-weight="bold">Hermes vs OpenClaw 多维对比</text>
  <text x="600" y="78" text-anchor="middle" fill="#8888aa" font-size="14">泽龙AI中转站实战测试 · 2026-06-07</text>

  <!-- 左侧：六维雷达图区域 -->
  <text x="440" y="120" text-anchor="middle" fill="#aab" font-size="16" font-weight="bold">六维能力雷达图</text>

  <!-- 雷达图背景网格 (六边形，中心 440,480, 半径 180) -->
  <g transform="translate(440,490)">
    <polygon points="0,-180 156,-90 156,90 0,180 -156,90 -156,-90" fill="none" stroke="#333355" stroke-width="1"/>
    <polygon points="0,-135 117,-67 117,67 0,135 -117,67 -117,-67" fill="none" stroke="#333355" stroke-width="1"/>
    <polygon points="0,-90 78,-45 78,45 0,90 -78,45 -78,-45" fill="none" stroke="#333355" stroke-width="1"/>
    <polygon points="0,-45 39,-22 39,22 0,45 -39,22 -39,-22" fill="none" stroke="#333355" stroke-width="1"/>

    <!-- 轴线 -->
    <line x1="0" y1="0" x2="0" y2="-190" stroke="#444466" stroke-width="1"/>
    <line x1="0" y1="0" x2="165" y2="-95" stroke="#444466" stroke-width="1"/>
    <line x1="0" y1="0" x2="165" y2="95" stroke="#444466" stroke-width="1"/>
    <line x1="0" y1="0" x2="0" y2="190" stroke="#444466" stroke-width="1"/>
    <line x1="0" y1="0" x2="-165" y2="95" stroke="#444466" stroke-width="1"/>
    <line x1="0" y1="0" x2="-165" y2="-95" stroke="#444466" stroke-width="1"/>

    <!-- Hermes 数据: 5,5,4,5,5,3 -->
    <!-- 坐标: 定时(0,-180), 飞书(156,-90), API(156,90), 自主(0,180), 协作(-156,90), 部署(-156,-90) -->
    <!-- Hermes 5,5,4,5,5,3 → 缩放因子 36 -->
    <polygon points="0,-180 156,-90 125,72 0,180 -156,90 -94,-54" fill="rgba(102,126,234,0.3)" stroke="#667eea" stroke-width="2.5"/>

    <!-- OpenClaw 数据: 1,3,5,2,3,4 -->
    <polygon points="0,-36 94,-54 156,90 0,72 -94,54 -125,-72" fill="rgba(240,147,251,0.25)" stroke="#f093fb" stroke-width="2.5"/>

    <!-- 标签 -->
    <text x="0" y="-200" text-anchor="middle" fill="#ccc" font-size="11">定时任务</text>
    <text x="180" y="-100" text-anchor="middle" fill="#ccc" font-size="11">飞书集成</text>
    <text x="180" y="110" text-anchor="middle" fill="#ccc" font-size="11">API调用</text>
    <text x="0" y="210" text-anchor="middle" fill="#ccc" font-size="11">自主任务</text>
    <text x="-180" y="110" text-anchor="middle" fill="#ccc" font-size="11">多Agent协作</text>
    <text x="-180" y="-100" text-anchor="middle" fill="#ccc" font-size="11">部署难度</text>
  </g>

  <!-- 图例 -->
  <g transform="translate(440,750)">
    <line x1="-60" y1="0" x2="0" y2="0" stroke="#667eea" stroke-width="3"/>
    <text x="8" y="4" fill="#ccc" font-size="12">Hermes (小夏·Python)</text>
    <line x1="110" y1="0" x2="170" y2="0" stroke="#f093fb" stroke-width="3"/>
    <text x="178" y="4" fill="#ccc" font-size="12">OpenClaw (小婷·Node.js)</text>
  </g>

  <!-- 右侧：评分表 -->
  <g transform="translate(720,110)">
    <text x="0" y="0" fill="#aab" font-size="16" font-weight="bold">详细评分</text>

    <!-- 表头 -->
    <rect x="0" y="15" width="420" height="30" rx="4" fill="#222244"/>
    <text x="10" y="35" fill="#aab" font-size="12">维度</text>
    <text x="200" y="35" fill="#667eea" font-size="12" font-weight="bold">Hermes</text>
    <text x="320" y="35" fill="#f093fb" font-size="12" font-weight="bold">OpenClaw</text>

    <!-- 行1 -->
    <rect x="0" y="48" width="420" height="26" rx="2" fill="#1a1a30"/>
    <text x="10" y="65" fill="#ddd" font-size="12">定时任务 Cron</text>
    <text x="200" y="65" fill="#667eea" font-size="12">⭐⭐⭐⭐⭐ 2317次/0失败</text>
    <text x="320" y="65" fill="#f093fb" font-size="12">⭐ 已停用</text>

    <rect x="0" y="76" width="420" height="26" rx="2" fill="#1e1e35"/>
    <text x="10" y="93" fill="#ddd" font-size="12">飞书集成</text>
    <text x="200" y="93" fill="#667eea" font-size="12">⭐⭐⭐⭐⭐ 原生SDK</text>
    <text x="320" y="93" fill="#f093fb" font-size="12">⭐⭐⭐ 需桥接</text>

    <rect x="0" y="104" width="420" height="26" rx="2" fill="#1a1a30"/>
    <text x="10" y="121" fill="#ddd" font-size="12">API调用能力</text>
    <text x="200" y="121" fill="#667eea" font-size="12">⭐⭐⭐⭐ 4.2s</text>
    <text x="320" y="121" fill="#f093fb" font-size="12">⭐⭐⭐⭐⭐ 4.0s</text>

    <rect x="0" y="132" width="420" height="26" rx="2" fill="#1e1e35"/>
    <text x="10" y="149" fill="#ddd" font-size="12">自主任务执行</text>
    <text x="200" y="149" fill="#667eea" font-size="12">⭐⭐⭐⭐⭐ 全自动闭环</text>
    <text x="320" y="149" fill="#f093fb" font-size="12">⭐⭐ 需外部cron</text>

    <rect x="0" y="160" width="420" height="26" rx="2" fill="#1a1a30"/>
    <text x="10" y="177" fill="#ddd" font-size="12">多Agent协作</text>
    <text x="200" y="177" fill="#667eea" font-size="12">⭐⭐⭐⭐⭐ 原生队列</text>
    <text x="320" y="177" fill="#f093fb" font-size="12">⭐⭐⭐ 需自建</text>

    <rect x="0" y="188" width="420" height="26" rx="2" fill="#1e1e35"/>
    <text x="10" y="205" fill="#ddd" font-size="12">部署难度</text>
    <text x="200" y="205" fill="#667eea" font-size="12">⭐⭐⭐ pip install</text>
    <text x="320" y="205" fill="#f093fb" font-size="12">⭐⭐⭐⭐ npm install</text>
  </g>

  <!-- 底部：技术栈对比 -->
  <g transform="translate(30,790)">
    <text x="0" y="0" fill="#aab" font-size="14" font-weight="bold">技术栈对比</text>
    <rect x="0" y="12" width="550" height="80" rx="6" fill="#1a1a30"/>
    <text x="15" y="38" fill="#667eea" font-size="13" font-weight="bold">Hermes</text>
    <text x="15" y="56" fill="#999" font-size="12">Python 3 · pip · venv · uvicorn · ~93MB</text>
    <text x="15" y="74" fill="#777" font-size="11">扩展: Python execute_code · 同语言生态</text>
    <rect x="0" y="92" width="550" height="1" fill="#333355"/>
    <text x="15" y="112" fill="#f093fb" font-size="13" font-weight="bold">OpenClaw</text>
    <text x="15" y="130" fill="#999" font-size="12">Node.js 25 · npm · Express · ~223MB</text>
    <text x="15" y="148" fill="#777" font-size="11">扩展: npm skill生态 · TUI界面 · 社区丰富</text>
  </g>

  <!-- 右侧：结论 -->
  <g transform="translate(600,790)">
    <text x="0" y="0" fill="#aab" font-size="14" font-weight="bold">最佳实践</text>
    <rect x="0" y="12" width="570" height="80" rx="6" fill="#1e1e35"/>
    <text x="15" y="38" fill="#ffe066" font-size="13" font-weight="bold">两者搭配使用 ⚡</text>
    <text x="15" y="56" fill="#999" font-size="12">OpenClaw(小婷) → 总调度 + 社区skill + TUI</text>
    <text x="15" y="74" fill="#999" font-size="12">Hermes(小夏) → 7×24定时 + 飞书协作 + 任务自动化</text>
    <text x="15" y="92" fill="#777" font-size="11">飞书Base → 统一任务队列 · 所有Agent通过Base协同</text>
  </g>

  <!-- 装饰：底部线条 -->
  <line x1="30" y1="770" x2="1170" y2="770" stroke="#333355" stroke-width="1"/>
  <text x="600" y="893" text-anchor="middle" fill="#555" font-size="10">🍂 小秋</text>
</svg>